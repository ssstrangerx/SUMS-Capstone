<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Teacher Registration | SUMS</title>
    <link rel="stylesheet" href="teacher_form_style.css" />
    <link rel="shortcut icon" href="logo.jpg" type="image/x-icon" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
  </head>
  <body>
    <center>
      <h1
        style="
          font-family: Verdana, Geneva, Tahoma, sans-serif;
          font-size: 40px;
        "
      >
        SUMS ⬩ Teacher Registration
      </h1>
    </center>

    <form id="teacherRegForm">
      <label for="teacherName">Full Name:</label><br />
      <input
        type="text"
        id="teacherName"
        placeholder="e.g. Dr. Anita Sharma"
        required
      /><br /><br />

      <label for="employeeId">Employee ID:</label><br />
      <input type="text" id="employeeId" required /><br /><br />

      <label for="email">Official Email ID:</label><br />
      <input type="email" id="email" required /><br /><br />

      <label for="password">Password:</label><br />
      <input type="password" id="password" minlength="7" required /><br /><br />

      <label for="designation">Designation:</label><br />
      <select id="designation" required>
        <option value="Professor">Professor</option>
        <option value="Assistant Professor">Assistant Professor</option>
        <option value="Dean">Dean</option></select
      ><br /><br />

      <input type="submit" value="Register Faculty" />
    </form>
    <script>
      console.log("Teacher script loaded");

      document
        .getElementById("teacherRegForm")
        .addEventListener("submit", async (e) => {
          e.preventDefault();

          console.log("🚀 Teacher form submitted");

          const email = document.getElementById("email").value;
          const password = document.getElementById("password").value;
          const fullName = document.getElementById("teacherName").value;
          const employeeId = document.getElementById("employeeId").value;
          const designation = document.getElementById("designation").value;

          console.log("📦 Data:", { email, fullName, employeeId, designation });

          // STEP 1: SIGN UP
          const { data, error } = await client.auth.signUp({
            email,
            password,
          });

          if (error) {
            console.error("❌ Auth Error:", error);
            alert(error.message);
            return;
          }

          console.log("✅ Auth response:", data);

          // 🚨 IMPORTANT CHECK
          if (!data.user || !data.user.id) {
            alert("User not properly created in Auth");
            console.error("User missing:", data);
            return;
          }

          // ⏳ WAIT to avoid FK error
          await new Promise((resolve) => setTimeout(resolve, 500));

          // STEP 2: UPSERT PROFILE
          const { error: profileError } = await client.from("profiles").upsert(
            [
              {
                id: data.user.id,
                email,
                full_name: fullName,
                role: "teacher",
                employee_id: employeeId,
                designation,
              },
            ],
            {
              onConflict: "id",
            },
          );

          if (profileError) {
            console.error("❌ Insert Error:", profileError);
            alert(profileError.message);
            return;
          }

          console.log("✅ Teacher profile inserted");
          alert("Teacher Registered Successfully!");
        });
    </script>
  </body>
</html>
